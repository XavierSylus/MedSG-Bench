### model
model_name_or_path: /root/autodl-tmp/qwen_weights
### method
stage: sft
do_train: true
finetuning_type: lora
# 核心收缩：仅微调注意力机制的 Q 和 V 投影层
lora_target: q_proj,v_proj
lora_rank: 8
freeze_vision_tower: true 
### dataset
# 复用 Round 4 的无前缀纯坐标数据集
dataset: Task8_round4_pure
dataset_dir: /root/autodl-tmp/MedSG-Bench/train
template: qwen2_vl
cutoff_len: 2048
max_samples: 100
overwrite_cache: true
preprocessing_num_workers: 8
### output
output_dir: /root/autodl-tmp/MedSG-Bench/train/output_round5_qv_only
logging_steps: 2
save_steps: 100
plot_loss: true
overwrite_output_dir: true
### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
