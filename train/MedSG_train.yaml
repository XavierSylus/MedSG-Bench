### model
model_name_or_path: /your/checkpoints/Qwen/Qwen2.5-VL-7B-Instruct
image_max_pixels: 262144
video_max_pixels: 16384
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: false  # choices: [true, false]
freeze_multi_modal_projector: false  # choices: [true, false]
freeze_language_model: true  # choices: [true, false]
deepspeed: examples/deepspeed/ds_z3_config.json  # choices: [ds_z0_config.json, ds_z2_config.json, ds_z3_config.json]

### dataset
dataset: MedSG_Registered_Diff, MedSG_Non_Registered_Diff, MedSG_multi_view, MedSG_tracking, MedSG_concept, MedSG_patch, MedSG_referring, MedSG_crossmodal

template: qwen2_vl
cutoff_len: 6000
max_samples: 1100000
overwrite_cache: true
preprocessing_num_workers: 128

### output
output_dir: /your/output_dir/path
logging_steps: 5
save_steps: 1000
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 5.0e-6
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.015
bf16: true
ddp_timeout: 180000000


# use_swanlab: true
